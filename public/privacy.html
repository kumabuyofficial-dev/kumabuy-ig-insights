      <h1>隱私政策</h1>
      <p>KumaBuy IG Insights 只會分析使用者主動提供，或經由授權連結流程取得的 Instagram 資料。</p>
      <h2>我們可能會處理的資料</h2>
      <p>Instagram 用戶名、帳號洞察、媒體洞察、說明文字、個人檔案指標、觀眾摘要資料及生成報告。</p>
      <h2>資料的使用方式</h2>
      <p>資料用於產生帳號診斷、內容績效排名及行銷建議。</p>
      <h2>資料刪除</h2>
      <p>使用者可聯絡 KumaBuy 團隊申請刪除授權與相關資料。我們會依照請求處理可識別資料與第三方資料連結。</p>
      <h2>聯絡人</h2>
      <p>如需隱私或資料刪除請求，請透過官方網站或 Instagram 帳號聯絡 KumaBuy 團隊。</p>
