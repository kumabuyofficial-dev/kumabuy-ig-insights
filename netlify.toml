[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/report"
  to = "/.netlify/functions/instagram-report"
  status = 200

[[redirects]]
  from = "/api/connect-instagram"
  to = "/.netlify/functions/connect-instagram"
  status = 200

[[redirects]]
  from = "/api/connect-data-source"
  to = "/.netlify/functions/connect-data-source"
  status = 200

[[redirects]]
  from = "/api/delete-data"
  to = "/.netlify/functions/delete-data"
  status = 200

[[redirects]]
  from = "/api/config-status"
  to = "/.netlify/functions/config-status"
  status = 200
